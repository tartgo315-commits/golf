# Deploy Expo static web to GitHub Pages (repo URL: /<repo-name>/)
# One-time: Repo Settings → Pages → Build and deployment → Source → GitHub Actions
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export static web
        run: npx expo export --platform web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist
          # v4 skips dotfiles by default; .nojekyll is required so Jekyll does not ignore _expo/
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
